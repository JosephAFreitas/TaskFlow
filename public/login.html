<!-- User authentication interface -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h1 id="formTitle">Login to Your To-Do List</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <div id="passwordRequirements" class="requirements">Min 8 characters</div>
            </div>
            <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
            </div>
            <button type="submit" id="submitBtn" class="login-btn">Login</button>
        </form>
        <div id="errorMessage" class="error-message"></div>
        <div class="signup-link">
            <a href="#" id="toggleMode">Don't have an account? Sign Up</a>
        </div>
    </div>
    <script src="login-script.js"></script>
</body>
</html>
