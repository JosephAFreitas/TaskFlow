<!-- Main to-do list interface -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="app-shell">
  <nav class="top-nav" aria-label="Primary navigation">
    <div class="top-nav-logo" title="TaskFlow home">TaskFlow</div>
    <button id="logoutBtn" class="logout-btn">Log Out</button>
  </nav>

  <div class="container">
    <div id="greetingContainer" class="dashboard-greeting"></div>

    <header>
      <div class="header-left">
        <h1>My To-Do List</h1>
      </div>

      <div class="header-actions">
        <button id="addBtn" class="add-btn" title="Add the task to your list">Add Task</button>
      </div>
    </header>

    <main>
      <section class="input-section">
        <div class="input-container">
          <div class="input-group">
            <label for="taskInput" title="Enter the description of your task">Task</label>
            <input
              type="text"
              id="taskInput"
              placeholder="Enter a new task..."
              class="task-input"
              title="Enter the description of your task"
            >
          </div>

          <div class="input-group">
            <label for="dueDateInput" title="Select the deadline">Due Date</label>
            <input
              type="date"
              id="dueDateInput"
              class="date-input"
              data-enforce-min-date="today"
              aria-label="Due date"
              title="Select the deadline"
            >
          </div>

          <div class="input-group">
            <label for="prioritySelect" title="Choose how urgent this is">Priority</label>
            <select id="prioritySelect" class="priority-select" aria-label="Task priority" title="Choose how urgent this is">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
        </div>
      </section>

      <section class="task-section">
        <ul id="taskList" class="task-list">
        </ul>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
